services:
    
  redis: 
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16
    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: IssueTrackingSystem
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data


volumes:
  postgres_data:
